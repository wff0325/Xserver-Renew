name: XServer Extend Schedule

on:
  schedule:
    # 日本时间每天 02:00 和 14:00 各运行一次
    - cron: '0 5,17 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  extend-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 脚本执行超限自动停止，防止扣费

    steps:
    - name: 📥 1. 下载公开库 (获取 package.json)
      uses: actions/checkout@v4

    - name: 📥 2. 下载私库 (获取 action.js)
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private # 替换为你的私库名
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 移动脚本到根目录
      run: |
        mv private_temp/action.js ./action.js
        # 如果私库还有其他依赖文件，请在这里一并 mv 过来

    - name: 🟢 4. 设置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # 因为 package.json 在根目录，缓存会自动生效

    - name: 📦 5. 安装依赖
      # 这会安装你 package.json 里的 playwright 1.57.0
      run: npm install

    - name: 🛠️ 6. 安装 Playwright 浏览器组件
      # 它会自动安装匹配 1.57.0 版本的 Chromium 及其 Linux 系统依赖
      run: npx playwright install --with-deps chromium

    - name: 🚀 7. 运行续费脚本
      env:
        # 这里务必在公开库的 Secrets 里配置好
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PYTHONIOENCODING: utf-8
      run: node action.js

    - name: 📸 8. 上传截图 (用于调试)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xserver-debug-screenshots
        path: "*.png"
        retention-days: 3 # 节省 GitHub 空间
