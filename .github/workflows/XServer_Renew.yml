name: HidenCloud Auto Renew

on:
  schedule:
    # 初始运行时间，运行成功后会自动被脚本修改
    - cron: '0 2 10 5 *' 
  workflow_dispatch: 

# 赋予工作流修改仓库和修改 Actions 的权限
permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 1. 检出代码
      uses: actions/checkout@v4

    - name: 🟢 2. 设置 Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 3. 安装依赖
      run: |
        pip install seleniumbase requests

    - name: 🚀 4. 运行续费脚本
      env:
        # 在 GitHub Secrets 中配置以下变量
        HIDENCLOUD: ${{ secrets.HIDENCLOUD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
        # 如果有固定 ID，请在 Secret 中添加 SERVER_ID 值为 207359
        SERVER_ID: ${{ secrets.SERVER_ID }}
      # 2>&1 | tee renew.log 的作用是将所有输出存入文件
      run: python main.py 2>&1 | tee renew.log

    - name: 🔄 5. 自动抓取日期并更新下次 Cron
      if: always()
      run: |
        # --- 调试步骤：看看 Python 最后输出了什么 ---
        echo "--- 脚本输出末尾内容 ---"
        tail -n 15 renew.log
        echo "----------------------"

        # --- 1. 提取 [FINAL_DUE_DATE] 标签后的日期 ---
        # 尝试匹配 YYYY-MM-DD 格式
        DUE_DATE=$(grep "\[FINAL_DUE_DATE\]" renew.log | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | tail -1)

        if [ -z "$DUE_DATE" ]; then
          # 如果没抓到标准格式，尝试抓取原始格式（如 01 May 2026）并转换
          RAW_VAL=$(grep "\[FINAL_DUE_DATE\]" renew.log | awk -F' ' '{print $NF}' | tail -1)
          if [ -n "$RAW_VAL" ]; then
             DUE_DATE=$(date -d "$RAW_VAL" +"%Y-%m-%d" 2>/dev/null || echo "")
          fi
        fi

        if [ -z "$DUE_DATE" ]; then
          echo "❌ 无法提取到日期，跳过 Cron 更新。请检查 Python 是否打印了 [FINAL_DUE_DATE]"
          exit 0
        fi

        echo "✅ 确定到期日期: $DUE_DATE"

        # --- 2. 生成新 Cron (定在到期当天 UTC 02:00 -> 北京时间 10:00) ---
        D=$(date -d "$DUE_DATE" +"%-d")
        M=$(date -d "$DUE_DATE" +"%-m")
        NEW_CRON="0 2 $D $M *"
        echo "新生成的 UTC Cron: $NEW_CRON"

        # --- 3. 自动寻找当前 yml 文件并修改 ---
        FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
        echo "正在更新文件: $FILENAME"
        sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"

        # --- 4. 使用高级 Token 提交回仓库 ---
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$FILENAME"
        
        # 只有在内容有变化时才执行 commit，避免报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自动预约下次续期: $DUE_DATE" && git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main)
      env:
        # 此处必须是你自己生成的具有 workflow 权限的 PAT
        GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}

    - name: 📸 6. 上传调试截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: hidencloud-debug
        path: screenshots/*.png
        retention-days: 3
