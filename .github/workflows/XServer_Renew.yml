name: XServer Auto Renew

on:
  schedule:
    # 初始运行时间，成功后会自动被脚本修改
    - cron: '40 14 02 05 *' 
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 1. 检出代码
      uses: actions/checkout@v4

    - name: 📥 2. 检出私有脚本库 (如有)
      # 如果 action.js 就在本仓库，可以删掉这一步和下一步
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 准备脚本
      run: |
        if [ -d "private_temp" ]; then
          mv private_temp/action.js ./action.js
        fi
        if [ ! -f "package.json" ]; then
          echo '{"dependencies": {"playwright": "1.41.0"}}' > package.json
        fi

    - name: 🟢 4. 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 5. 安装依赖
      run: |
        npm install
        npx playwright install --with-deps chromium

    - name: 🚀 6. 运行续费脚本 (Node.js)
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      # ❗ 修正：运行 node action.js，并将输出记录到 renew.log
      run: node action.js 2>&1 | tee renew.log

    - name: 🔄 7. 自动抓取 [NEXT_TIME] 并更新 Cron
      if: always()
      run: |
        echo "--- 脚本输出末尾内容 ---"
        tail -n 10 renew.log
        echo "----------------------"

        # 1. 提取 [NEXT_TIME] 后的日本时间 (格式: 2026-05-02 23:30)
        RAW_TIME=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}' renew.log | tail -1)
        
        if [ -z "$RAW_TIME" ]; then
          echo "❌ 无法提取到 [NEXT_TIME]，跳过 Cron 更新。"
          exit 0
        fi

        echo "✅ 提取到日本下次时间: $RAW_TIME"

        # 2. 转换为 UTC 时间并增加 10 分钟保险 (JST 23:30 -> UTC 14:40)
        # 显式指定 +0900 时区进行转换
        UTC_TIME=$(date -d "$RAW_TIME +0900 - 9 hours + 10 minutes" +"%M %H %d %m *")
        
        M=$(echo $UTC_TIME | cut -d' ' -f1)
        H=$(echo $UTC_TIME | cut -d' ' -f2)
        D=$(echo $UTC_TIME | cut -d' ' -f3)
        MONTH=$(echo $UTC_TIME | cut -d' ' -f4)
        
        NEW_CRON="$M $H $D $MONTH *"
        echo "🚀 新生成的 UTC Cron: $NEW_CRON"

        # 3. 自动定位并修改当前 YML 文件
        FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
        sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"

        # 4. 提交更改
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$FILENAME"
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自动预约: $RAW_TIME JST" && git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main)
      env:
        GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}

    - name: 📸 8. 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xserver-screenshots
        path: "*.png"
        retention-days: 3
