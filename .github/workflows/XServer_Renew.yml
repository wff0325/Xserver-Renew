name: HidenCloud Auto Renew

on:
  schedule:
    # 初始运行时间，运行成功后会自动修改
    - cron: '0 2 10 5 *' 
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 1. 检出代码
      uses: actions/checkout@v4

    - name: 🟢 2. 设置 Python 环境
      uses: actions/setup-node@v4 # 仅为了复用部分逻辑，其实setup-python即可
      # 这里使用标准的 Python 环境设置
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 3. 安装依赖
      run: pip install seleniumbase requests

    - name: 🚀 4. 运行续费脚本
      env:
        HIDENCLOUD: ${{ secrets.HIDENCLOUD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
        # 如果你有手动 ID，也可以加上：SERVER_ID: ${{ secrets.SERVER_ID }}
      run: python main.py 2>&1 | tee renew.log

    - name: 🔄 5. 自动更新下一次 Cron 时间
      if: always()
      run: |
        # 1. 查找包含“到期时间(标准)”的行
        TARGET_LINE=$(grep "到期时间(标准)" renew.log | tail -1)
        echo "目标行内容: $TARGET_LINE"

        # 2. 提取日期部分（去掉前缀）
        # 如果 TARGET_LINE 是 "[INFO] 到期时间(标准): 01 May 2026" 
        # 或者 "到期时间(标准): 2026-05-10"
        RAW_DATE=$(echo "$TARGET_LINE" | awk -F': ' '{print $2}' | xargs)
        
        if [ -z "$RAW_DATE" ] || [ "$RAW_DATE" = "N/A" ]; then
          echo "❌ 未能从日志中提取到有效日期，跳过更新。"
          exit 0
        fi

        echo "提取到的原始日期: $RAW_DATE"

        # 3. 使用 date 命令强制转换为 YYYY-MM-DD 格式 (防止 01 May 2026 这种格式无法被 grep)
        # date 命令非常强大，可以识别 "01 May 2026" 
        DUE_DATE=$(date -d "$RAW_DATE" +"%Y-%m-%d" 2>/dev/null || echo "")

        if [ -z "$DUE_DATE" ]; then
          # 如果转换失败，尝试正则抓取 YYYY-MM-DD
          DUE_DATE=$(echo "$RAW_DATE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
        fi

        if [ -z "$DUE_DATE" ]; then
          echo "❌ 日期格式转换失败，跳过更新。"
          exit 0
        fi

        echo "✅ 最终确定的到期日期: $DUE_DATE"

        # 4. 生成新 Cron (定在到期当天 UTC 02:00，即北京时间 10:00)
        D=$(date -d "$DUE_DATE" +"%-d")
        M=$(date -d "$DUE_DATE" +"%-m")
        NEW_CRON="0 2 $D $M *"
        echo "新生成的 UTC Cron: $NEW_CRON"

        # 5. 修改 YML 文件
        FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
        sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"

        # 6. 提交更改
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$FILENAME"
        git commit -m "🔄 自动预约下次续期: $DUE_DATE" || echo "无需更新"
        git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
      env:
        GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
