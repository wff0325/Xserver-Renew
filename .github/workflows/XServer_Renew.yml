name: XServer Auto Renew

on:
  schedule:
    # 初始运行时间，成功后会自动被脚本修改
    - cron: '40 14 04 05 *'
  workflow_dispatch: 

# 赋予基础读写权限
permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 1. 检出代码
      uses: actions/checkout@v4
      with:
        # 必须使用 persist-credentials: false 才能在后面手动指定 Token 推送
        persist-credentials: false

    - name: 📥 2. 检出私有脚本库
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 准备脚本环境
      run: |
        # 移动私有库里的脚本到当前根目录
        if [ -d "private_temp" ]; then
          mv private_temp/action.js ./action.js
        fi
        # 如果根目录没有 package.json，创建一个以安装 playwright
        if [ ! -f "package.json" ]; then
          echo '{"dependencies": {"playwright": "1.41.0"}}' > package.json
        fi

    - name: 🟢 4. 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 5. 安装依赖
      run: |
        npm install
        npx playwright install --with-deps chromium

    - name: 🚀 6. 运行续费脚本
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      # 运行脚本并将所有输出记录到 renew.log
      run: node action.js 2>&1 | tee renew.log

    - name: 🔄 7. 提取时间并强制更新 Cron
      if: always()
      run: |
        # 1. 配置 Git 身份
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        echo "--- 调试：脚本输出末尾内容 ---"
        if [ -f renew.log ]; then tail -n 10 renew.log; else echo "renew.log 不存在"; fi
        echo "--------------------------"

        # 2. 提取 [NEXT_TIME] 标签后的日本时间 (格式: 2026-05-02 23:30)
        RAW_TIME=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}' renew.log | tail -1)
        
        if [ -z "$RAW_TIME" ]; then
          echo "❌ 无法从日志中提取到时间，跳过 Cron 更新。"
          exit 0
        fi

        echo "✅ 提取到日本时间: $RAW_TIME"

        # 3. 转换为 UTC 时间并增加 10 分钟缓冲 (JST -> UTC)
        # tr -d '\n\r' 确保变量纯净，防止 sed 报错
        NEW_CRON=$(date -d "$RAW_TIME +0900 + 10 minutes" -u +"%M %H %d %m *" 2>/dev/null | tr -d '\n\r' || echo "")
        
        if [ -z "$NEW_CRON" ]; then
          echo "❌ 时间转换失败，请检查 RAW_TIME 格式"
          exit 1
        fi
        echo "🚀 新生成的 UTC Cron: $NEW_CRON"

        # 4. 自动定位当前的 YML 文件
        FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
        if [ -n "$FILENAME" ]; then
          echo "📝 正在修改文件: $FILENAME"
          
          # ⭐ 终极修复方案：
          # 1. 0,/cron:/ 确保只修改文件最顶部的第一个 cron 配置，不破坏脚本代码本身
          # 2. s@cron:.*@... 匹配 cron: 之后的所有内容（无论是否有空格或引号），强行重写
          sed -i "0,/cron:/s@cron:.*@cron: '$NEW_CRON'@" "$FILENAME"
          
          echo "🔍 验证修改结果（显示首个 cron 行）："
          grep "cron:" "$FILENAME" | head -n 1
          
          git add "$FILENAME"
          
          # 5. 提交并推送
          if git diff --staged --quiet; then
            echo "ℹ️ Cron 表达式没有实际变化，跳过提交。"
          else
            git commit -m "🔄 自动更新下次运行时间: $RAW_TIME JST"
            # 使用 Token 嵌入 URL 强制推送
            git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
          fi
        else
          echo "❌ 找不到包含 cron 配置的工作流文件"
          exit 1
        fi

    - name: 📸 8. 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xserver-screenshots
        path: "*.png"
        retention-days: 3
