name: HidenCloud Auto Renew

on:
  schedule:
    # 初始运行时间，运行成功后会自动修改
    - cron: '0 2 10 5 *' 
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 1. 检出代码
      uses: actions/checkout@v4

    - name: 🟢 2. 设置 Python 环境
      uses: actions/setup-node@v4 # 仅为了复用部分逻辑，其实setup-python即可
      # 这里使用标准的 Python 环境设置
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 3. 安装依赖
      run: pip install seleniumbase requests

    - name: 🚀 4. 运行续费脚本
      env:
        HIDENCLOUD: ${{ secrets.HIDENCLOUD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
        # 如果你有手动 ID，也可以加上：SERVER_ID: ${{ secrets.SERVER_ID }}
      run: python main.py 2>&1 | tee renew.log

    - name: 🔄 5. 自动更新下一次 Cron 时间
      if: success()
      run: |
        # 提取日期 (格式: 2026-05-10)
        DUE_DATE=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' renew.log | tail -1)
        
        if [ -z "$DUE_DATE" ]; then
          echo "未发现到期时间，跳过更新。"
          exit 0
        fi

        echo "检测到到期日期: $DUE_DATE"

        # HidenCloud 通常在到期当天续期即可
        # 我们把时间定在到期当天的 UTC 02:00 (北京时间上午10点)
        M="0"
        H="2"
        D=$(date -d "$DUE_DATE" +"%d")
        MONTH=$(date -d "$DUE_DATE" +"%m")
        
        NEW_CRON="$M $H $D $MONTH *"
        echo "新生成的 UTC Cron: $NEW_CRON"

        # 自动定位当前 yml 文件
        FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
        
        sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"

        # 使用之前讨论过的“高级 Token”方式推送
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$FILENAME"
        git commit -m "🔄 自动预约下次续期: $DUE_DATE" || echo "无需更新"
        
        # 强制使用带 Token 的 URL 推送以确保 workflow 权限
        git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
      env:
        GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
