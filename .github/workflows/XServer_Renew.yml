- name: 🔄 7. 自动更新下一次 Cron 时间
      if: always()
      run: |
        # 1. 提取时间
        RAW_TIME=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}' renew.log | tail -1)
        if [ -z "$RAW_TIME" ]; then
          echo "未发现预约时间，跳过更新。"
          exit 0
        fi

        # 2. 生成新 Cron
        UTC_TIME=$(date -d "$RAW_TIME +0900 - 9 hours + 10 minutes" +"%M %H %d %m *")
        M=$(echo $UTC_TIME | cut -d' ' -f1)
        H=$(echo $UTC_TIME | cut -d' ' -f2)
        D=$(echo $UTC_TIME | cut -d' ' -f3)
        MONTH=$(echo $UTC_TIME | cut -d' ' -f4)
        NEW_CRON="$M $H $D $MONTH *"
        echo "新生成的 UTC Cron: $NEW_CRON"

        # 3. 定位并修改 YML
        FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
        sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"

        # 4. 强制使用高级 Token 推送
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$FILENAME"
        
        # 这一行是关键修改：手动拼接包含 Token 的远程地址
        # 我们把 Token 嵌入 URL 确保权限生效
        git commit -m "🔄 自动更新下次运行时间: $RAW_TIME JST" || echo "无需更新"
        
        # 将 Token 注入远程 URL 进行推送
        git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
