- name: 🔄 5. 自动更新下一次 Cron 时间
      if: always()
      run: |
        # 1. 打印日志最后 10 行，看看 Python 到底输出了啥 (调试用)
        echo "--- 脚本输出末尾内容 ---"
        tail -n 10 renew.log
        echo "----------------------"

        # 2. 提取 [FINAL_DUE_DATE] 后的日期
        # 支持 2026-05-10 格式
        DUE_DATE=$(grep "\[FINAL_DUE_DATE\]" renew.log | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | tail -1)

        if [ -z "$DUE_DATE" ]; then
          # 如果没抓到标准格式，尝试抓取原始格式并转换
          RAW_VAL=$(grep "\[FINAL_DUE_DATE\]" renew.log | awk -F'] ' '{print $2}' | tail -1)
          if [ -n "$RAW_VAL" ]; then
             DUE_DATE=$(date -d "$RAW_VAL" +"%Y-%m-%d" 2>/dev/null || echo "")
          fi
        fi

        if [ -z "$DUE_DATE" ]; then
          echo "❌ 依然无法提取到日期，请检查上方日志输出。"
          exit 0
        fi

        echo "✅ 成功确定到期日期: $DUE_DATE"

        # 3. 生成新 Cron (UTC 02:00 -> 北京时间 10:00)
        D=$(date -d "$DUE_DATE" +"%-d")
        M=$(date -d "$DUE_DATE" +"%-m")
        NEW_CRON="0 2 $D $M *"
        echo "新生成的 UTC Cron: $NEW_CRON"

        # 4. 修改 YML 文件
        FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
        sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"

        # 5. 推送更改 (使用你的高级 Token)
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$FILENAME"
        git commit -m "🔄 自动预约下次续期: $DUE_DATE" || echo "无需更新"
        git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
