name: XServer Auto Renew

on:
  schedule:
    # 初始运行时间，成功后会自动被脚本修改
    - cron: '40 14 02 05 *' 
  workflow_dispatch: 

# 赋予基础读写权限
permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 1. 检出代码
      uses: actions/checkout@v4
      with:
        # 必须使用 persist-credentials: false 才能在后面手动指定 Token 推送
        persist-credentials: false

    - name: 📥 2. 检出私有脚本库
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 准备脚本环境
      run: |
        # 移动私有库里的脚本到当前根目录
        if [ -d "private_temp" ]; then
          mv private_temp/action.js ./action.js
        fi
        # 如果根目录没有 package.json，创建一个以安装 playwright
        if [ ! -f "package.json" ]; then
          echo '{"dependencies": {"playwright": "1.41.0"}}' > package.json
        fi

    - name: 🟢 4. 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 5. 安装依赖
      run: |
        npm install
        npx playwright install --with-deps chromium

    - name: 🚀 6. 运行续费脚本
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      # 运行脚本并将所有输出记录到 renew.log
      run: node action.js 2>&1 | tee renew.log

    - name: 🔄 7. 提取时间并强制更新 Cron
      if: always()
      run: |
        echo "--- 调试：脚本输出末尾内容 ---"
        tail -n 10 renew.log
        echo "--------------------------"

        # 1. 提取 [NEXT_TIME] 标签后的日本时间 (格式: 2026-05-02 23:30)
        RAW_TIME=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}' renew.log | tail -1)
        
        if [ -z "$RAW_TIME" ]; then
          echo "❌ 无法从日志中提取到 [NEXT_TIME]，跳过 Cron 更新。"
          exit 0
        fi

        echo "✅ 提取到日本时间: $RAW_TIME"

        # 2. 转换为 UTC 时间并增加 10 分钟缓冲 (JST 23:30 -> UTC 14:40)
        # 明确告诉 date 这是日本时间 (+0900)，然后输出 UTC 格式 (-u)
        NEW_CRON=$(date -d "$RAW_TIME +0900 + 10 minutes" -u +"%M %H %d %m *")
        
        echo "🚀 新生成的 UTC Cron: $NEW_CRON"

        # 3. 自动定位当前的 YML 文件
        FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
        if [ -z "$FILENAME" ]; then
          echo "❌ 找不到包含 cron 配置的工作流文件"
          exit 1
        fi
        
        # 4. 修改文件中的 Cron 表达式
        sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"

        # 5. 提交更改并强制使用高级 Token 推送
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$FILENAME"
        
        # 只有在有变化时才执行 commit
        if git diff --staged --quiet; then
          echo "ℹ️ Cron 表达式没有变化，无需推送。"
        else
          git commit -m "🔄 自动更新下次运行时间: $RAW_TIME JST"
          # ❗ 核心：将 Token 嵌入 URL 进行推送，确保拥有 workflow 权限
          git push "https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main --force
        fi

    - name: 📸 8. 上传截图
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xserver-screenshots
        path: "*.png"
        retention-days: 3
