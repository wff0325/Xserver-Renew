name: XServer Extend Schedule

on:
  schedule:
    # 默认时间，运行后会自动更新
    - cron: '0 5 * * *'
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  extend-server:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 1. 检出公开库代码
      uses: actions/checkout@v4

    - name: 📥 2. 检出私有脚本库
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/Renew-Private # 替换为你的私库名
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: private_temp

    - name: 📂 3. 准备脚本环境
      run: |
        mv private_temp/action.js ./action.js
        # 确保根目录有 package.json，如果没有则创建最简版以支持依赖
        if [ ! -f "package.json" ]; then
          echo '{"dependencies": {"playwright": "1.41.0"}}' > package.json
        fi

    - name: 🟢 4. 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 5. 安装依赖
      run: |
        npm install
        npx playwright install --with-deps chromium

    - name: 🚀 6. 运行续费脚本
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: node action.js 2>&1 | tee renew.log

    - name: 🔄 7. 自动更新下一次 Cron 时间
      if: always()
      run: |
        # 提取 JS 打印的 [NEXT_TIME] 时间 (格式: 2026-05-02 23:30)
        RAW_TIME=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}' renew.log | tail -1)
        
        if [ -z "$RAW_TIME" ]; then
          echo "未发现预约时间，跳过更新。"
          exit 0
        fi

        echo "日本下次时间: $RAW_TIME"

        # 转换为 UTC 格式给 GitHub 使用 (JST 是 UTC+9)
        # 逻辑：减去 9 小时，再增加 10 分钟保险缓冲
        UTC_TIME=$(date -d "$RAW_TIME +0900 - 9 hours + 10 minutes" +"%M %H %d %m *")
        
        M=$(echo $UTC_TIME | cut -d' ' -f1)
        H=$(echo $UTC_TIME | cut -d' ' -f2)
        D=$(echo $UTC_TIME | cut -d' ' -f3)
        MONTH=$(echo $UTC_TIME | cut -d' ' -f4)
        
        NEW_CRON="$M $H $D $MONTH *"
        echo "新生成的 UTC Cron: $NEW_CRON"

        # 动态定位当前的 YML 文件
        FILENAME=$(grep -l "cron:" .github/workflows/*.yml | head -n 1)
        
        # 替换文件中的 Cron 表达式
        sed -i "s@cron: '.*'@cron: '$NEW_CRON'@g" "$FILENAME"

        # 提交到仓库
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$FILENAME"
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自动更新下次运行时间: $RAW_TIME JST" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
